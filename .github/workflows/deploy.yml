name: Build & deploy

on:
  push:
    branches: [main]
  schedule:
    # Weekly data refresh (Monday 03:30 UTC) — re-fetches GTFS and OSM geometries
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # GTFS is always fetched fresh (never cached in CI). On the weekly run,
      # OSM geometries are also re-fetched; commit the updated cache if changed.
      - name: Build transit data
        run: npm run build:data
        env:
          OSM_REFRESH: ${{ github.event_name == 'schedule' && '1' || '' }}

      - name: Commit refreshed OSM geometry cache
        if: github.event_name == 'schedule'
        run: |
          if ! git diff --quiet data-cache/; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data-cache/
            git commit -m "chore: weekly OSM geometry cache refresh [skip ci]"
            git push
          fi

      - name: Build site
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
